<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DroidPerf</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script><style>
body{font:15px Segoe UI,sans-serif;max-width:1100px;margin:auto;padding:24px;background:#0e1522;color:#e8eef7}section{background:#172235;border:1px solid #2b3c57;border-radius:12px;padding:18px;margin:16px 0}input,button{padding:10px;border-radius:7px;border:1px solid #52657e}input{background:#0e1522;color:white;width:330px}button{cursor:pointer;font-weight:bold;background:#38d39f}.stop{background:#ff6b7a}.badge{float:right;padding:8px 12px;border-radius:20px;background:#38465b}.good{background:#124d3e}.row{display:flex;gap:10px;align-items:end;flex-wrap:wrap}.stat{display:inline-block;background:#101a2b;padding:12px;margin:4px;border-radius:7px}.stat small{display:block;color:#9eb0c9}.stat strong{font-size:20px}.muted{color:#9eb0c9}canvas{max-height:430px}.past button{display:block;margin:6px 0;background:transparent;color:#9fe8ff}
</style></head><body><h1>DroidPerf <span id="gpu" class="badge">Checking GPU…</span></h1><p class="muted">Browser-based Android performance testing via ADB</p><section><div class="row"><label>Package name<br><input id="pkg" placeholder="com.example.game"></label><button id="detect">Detect foreground app</button><button id="toggle">Start</button></div><p id="status" class="muted"></p></section><section><canvas id="chart"></canvas></section><section><div id="stats"></div></section><section><h2>Analysis</h2><div id="report" class="muted">Stop a session to see the report.</div></section><section><h2>Past Sessions</h2><div id="history" class="muted">Loading…</div></section><script>
const $=x=>document.getElementById(x),fmt=x=>x==null?'—':Number(x).toFixed(1);let id=null,es=null,chart;
function reset(){chart.data.labels=[];chart.data.datasets.forEach(d=>d.data=[]);chart.update()}
function add(s){chart.data.labels.push(chart.data.labels.length+1);chart.data.datasets[0].data.push(s.fps);chart.data.datasets[1].data.push(s.cpu_avg_clock_mhz);chart.data.datasets[2].data.push(s.gpu_clock_mhz);chart.data.datasets[3].data.push(s.ram_pss_kb==null?null:s.ram_pss_kb/1024);chart.update()}
function result(d){let a=d.aggregates||{};$('stats').innerHTML=[['Avg FPS',fmt(a.avg_fps)],['1% Low',fmt(a.low_1_percent_fps)],['10% Low',fmt(a.low_10_percent_fps)],['Peak RAM',fmt(a.peak_ram_pss_kb/1024)+' MB'],['CPU MHz',fmt(a.cpu_clock_min_mhz)+'–'+fmt(a.cpu_clock_max_mhz)]].map(x=>`<span class="stat"><small>${x[0]}</small><strong>${x[1]}</strong></span>`).join('');let r=d.report||{};$('report').innerHTML=`<p>${r.verdict||'—'}</p><p><b>Bottleneck:</b> ${r.bottleneck||'—'}</p><p>${r.bottleneck_explanation||''}</p><b>Recommendations</b><ul>${(r.recommendations||[]).map(x=>`<li>${x}</li>`).join('')}</ul>`}
async function history(){let a=await fetch('/sessions').then(r=>r.json());$('history').innerHTML=a.length?a.map(x=>`<button onclick="load('${x.session_id}')">${x.package_name||'unknown'} · ${fmt(x.avg_fps)} FPS · ${new Date(x.created_at).toLocaleString()}</button>`).join(''):'No sessions yet.'}
async function load(x){let d=await fetch('/sessions/'+x).then(r=>r.json());reset();(d.samples||[]).forEach(add);result(d)}
async function start(){let d=await fetch('/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({package_name:$('pkg').value})}).then(r=>r.json());id=d.session_id;reset();es=new EventSource('/stream/'+id);es.onmessage=e=>add(JSON.parse(e.data));$('toggle').textContent='Stop';$('toggle').className='stop';$('pkg').disabled=true;$('status').textContent='Collecting…'}
async function stop(){es.close();let d=await fetch('/stop/'+id,{method:'POST'}).then(r=>r.json());result(d);history();$('toggle').textContent='Start';$('toggle').className='';$('pkg').disabled=false;$('status').textContent='Session saved.'}
$('detect').onclick=async()=>{$('pkg').value=(await fetch('/detect-app').then(r=>r.json())).package_name||''};$('toggle').onclick=()=>$('toggle').textContent==='Stop'?stop():start();
chart=new Chart($('chart'),{type:'line',data:{labels:[],datasets:[{label:'FPS',data:[],borderColor:'#65edc0',tension:.2},{label:'CPU MHz',data:[],borderColor:'#9fe8ff',tension:.2},{label:'GPU MHz',data:[],borderColor:'#c99cff',tension:.2},{label:'RAM MB',data:[],borderColor:'#ffca70',tension:.2}]},options:{animation:false,scales:{y:{beginAtZero:true}}}});
(async()=>{let g=await fetch('/gpu-support').then(r=>r.json());$('gpu').textContent=g.gpu_supported?'GPU tracking available':'GPU tracking unsupported';if(g.gpu_supported)$('gpu').className='badge good';let a=await fetch('/detect-app').then(r=>r.json());if(a.package_name)$('pkg').value=a.package_name;history()})();
</script></body></html>
